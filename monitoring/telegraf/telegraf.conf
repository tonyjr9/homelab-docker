[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""

[global_tags]
  host = "${HOSTNAME}"
  environment = "home-lab"

[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = true
  report_active = false

[[inputs.mem]]
[[inputs.disk]]
[[inputs.diskio]]
[[inputs.net]]
[[inputs.system]]
[[inputs.sensors]]
#[[inputs.exec]] # for commands and cool stuff

[[inputs.docker]]
    endpoint = "unix:///var/run/docker.sock"
    # container_names = []
    timeout = "5s"
    # perdevice = true
    # total = false

[[inputs.ping]]
  urls = ["8.8.8.8", "1.1.1.1"]
  count = 3
  timeout = 2.0


# System monitoring input currently unused
#[[inputs.disk]]
#[[inputs.diskio]]
#[[inputs.kernel]]
#[[inputs.mem]]
#[[inputs.netstat]]
#[[inputs.swap]]
#[[inputs.system]]

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  organization = "home"
  token = "$INFLUX_TOKEN"
  bucket = "telegraf"
