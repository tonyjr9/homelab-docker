---
services:
  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./configs:/app/data/configs
      - ./icons:/app/public/icons
      - ./data:/data
      - ./imgs/backgrounds:/app/public/imgs/backgrounds
    ports:
      - '7575:7575'
    environment:
      - SECRET_ENCRYPTION_KEY=${HOMARR_SECRET_KEY}
    networks:
      - proxy_network


  dash:
    image: mauricenino/dashdot:latest
    restart: unless-stopped
    privileged: true
    ports:
      - '192.168.0.102:3001:3001'
    volumes:
      - /:/mnt/host:ro
    environment:
      # CPU & Temperature Monitoring
      DASHDOT_ENABLE_CPU_TEMPS: 'true'
      DASHDOT_CPU_TEMPS_MODE: 'auto'  # auto, psutil, lm-sensors

      # GPU Monitoring

      # Network
      DASHDOT_ENABLE_NETWORK: 'true'
      DASHDOT_NETWORK_INTERFACE: 'eno1'  # Change to your interface

      # Storage
      DASHDOT_ENABLE_STORAGE: 'true'

      # Processes
      DASHDOT_ENABLE_PROCESSES: 'true'

      # OS Info
      DASHDOT_ENABLE_OS: 'true'

      # Theming
      DASHDOT_LIGHT_MODE: 'false'  # true for light theme
      DASHDOT_ACCENT_COLOR: '#FF0000'  # Hex color

      # Server Settings
      DASHDOT_PORT: '3001'
      DASHDOT_OVERRIDE_OS: ''  # Leave empty for auto-detect

      # Advanced
      DASHDOT_ALWAYS_SHOW_PERCENTAGES: 'true'
      DASHDOT_SPEED_AVERAGE_COUNT: '10'
      DASHDOT_GRAPH_MAX_DATAPOINTS: '20'
      DASHDOT_WIDGET_LIST: 'os,cpu,storage,ram,network'  # Custom widget order

